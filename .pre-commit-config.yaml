repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.0.283
    hooks:
      - id: ruff
        args: ["check", "src", "tests"]
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.14
  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v3.8.0
    hooks:
      - id: isort
        args: ["--profile", "black"]
